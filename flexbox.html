<!doctype html>

<html>
  <head>
    <title>Flexbox</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        border: 1px solid black;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .box-1 {
        background: red;
      }
      .box-2 {
        background: yellow;
      }
      .box-3 {
        background: green;
      }
      .box-4 {
        background: blue;
      }
      .box-5 {
        background: purple;
      }
    </style>
  </head>
  <body>
    <div
      style="
        display: flex;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        padding: 32px;
      "
    >
      <div style="display: flex; justify-content: center; gap: 16px">
        <div class="box box-1" style="display: flex; flex-grow: 3">1</div>
        <div class="box box-2">2</div>
      </div>

      <div style="display: flex; justify-content: center; gap: 16px">
        <div class="box box-3">3</div>
        <div class="box box-4" style="display: flex; flex-grow: 2">4</div>
        <div class="box box-5">5</div>
      </div>
    </div>
  </body>
</html>
